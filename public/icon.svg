<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="dollarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Glow halo behind circle -->
  <circle cx="256" cy="256" r="148" fill="#6366f1" fill-opacity="0.25" filter="url(#glow)"/>

  <!-- Main circle -->
  <circle cx="256" cy="256" r="130" fill="url(#circleGrad)"/>

  <!-- Circle inner highlight ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Dollar sign $ -->
  <!-- Vertical bar -->
  <rect x="242" y="148" width="28" height="216" rx="14" fill="url(#dollarGrad)" filter="url(#softGlow)"/>

  <!-- Top curve of S -->
  <path d="M256 172 C220 172 196 190 196 218 C196 248 222 260 256 268 C290 276 316 288 316 318 C316 348 292 366 256 366"
        fill="none" stroke="url(#dollarGrad)" stroke-width="32" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- Top tick -->
  <rect x="242" y="144" width="28" height="28" rx="8" fill="url(#dollarGrad)"/>
  <!-- Bottom tick -->
  <rect x="242" y="340" width="28" height="28" rx="8" fill="url(#dollarGrad)"/>

  <!-- Small accent dots bottom right -->
  <circle cx="388" cy="388" r="10" fill="white" fill-opacity="0.18"/>
  <circle cx="414" cy="370" r="6" fill="white" fill-opacity="0.10"/>
</svg>
