<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // GitHub Pages SPA redirect — preserve the path for client-side routing
    var path = window.location.pathname.replace('/expensetracker', '') || '/';
    sessionStorage.setItem('spa_redirect', path + window.location.search + window.location.hash);
    window.location.replace('/expensetracker/');
  </script>
</head>
<body></body>
</html>
